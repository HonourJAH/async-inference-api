name: Async Inference API CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # Job 1: Run Tests
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache pip dependencies so they don't reinstall on every run
      # Cache key changes only when requirements.txt changes
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # Tests use fakeredis so no real Redis instance is needed here
      - name: Run tests
        run: pytest app/test/ -v --tb=short

      - name: Show test coverage
        run: pytest app/test/ --cov=app --cov-report=term-missing --tb=short


  # Job 2: Build & Verify Docker Image
  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
        - uses: actions/checkout@v4

        - name: Start services
          run: docker compose up -d --build

        - name: Wait for API to start
          run: sleep 30

        - name: Health check
          run: curl --fail http://localhost:8000/health

        - name: Show logs on failure
          if: failure()
          run: docker compose logs

        - name: Stop services
          run: docker compose down
