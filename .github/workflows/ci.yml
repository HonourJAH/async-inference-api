name: Async Inference API CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # Job 1: Run Tests
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pytest-cov

      - name: Run test suite with coverage
        run: pytest app/test/ -v --cov=app --cov-report=term-missing --tb=short


  # Job 2: Build & Verify Docker Image
  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache trained model
        uses: actions/cache@v4
        id: model-cache
        with:
          path: model.joblib
          key: model-${{ hashFiles('train.py', 'requirements.txt') }}

      - name: Train model if not cached
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: python3 train.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: async-inference-api:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Prevents cache from growing indefinitely
      - name: Move Docker cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Start services
        run: docker compose up -d

      # Active health check — retries every 2 seconds for up to 60 seconds
      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:8000/health && break
            echo "Waiting for API... ($i/30)"
            sleep 2
          done

      - name: Health check
        run: curl --fail http://localhost:8000/health

      # Verify worker connected to Redis successfully
      - name: Check worker connected to Redis
        run: |
          sleep 5
          docker compose logs worker | grep -q "ready" || \
          (echo "Worker failed to connect to Redis" && exit 1)

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop services
        run: docker compose down
