name: Async Inference API CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Job 1: Run Tests (Optimized to run only once)
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pytest-cov

      # Combined run and coverage reporting into a single command
      - name: Run test suite with coverage
        run: pytest app/test/ -v --cov=app --cov-report=term-missing --tb=short

  # Job 2: Build & Verify Docker Image (With Buildx Layer Caching)
  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
        - uses: actions/checkout@v4

        # Sets up the advanced Docker BuildKit engine on the runner
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        # Exposes GitHub Actions cache to Docker Compose
        - name: Cache Docker layers
          uses: actions/cache@v4
          with:
            path: /tmp/.buildx-cache
            key: ${{ runner.os }}-buildx-${{ github.sha }}
            restore-keys: |
              ${{ runner.os }}-buildx-

        - name: Start services
          env:
            COMPOSE_DOCKER_CLI_BUILD: 1
            DOCKER_BUILDKIT: 1
          run: |
            docker compose build --build-arg BUILDKIT_INLINE_CACHE=1
            docker compose up -d

        - name: Wait for API to start
          run: sleep 10 # Reduced from 30 since cached containers boot much faster

        - name: Health check
          run: curl --fail http://localhost:8000/health

        - name: Show logs on failure
          if: failure()
          run: docker compose logs

        - name: Stop services
          run: docker compose down
